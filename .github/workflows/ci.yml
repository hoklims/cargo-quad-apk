name: CI

on:
  push:
    branches: ["**"]
    paths-ignore: ["**.md", "LICENSE-*", ".gitignore", ".gitattributes"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The toolchain (and rustfmt/clippy components) come from rust-toolchain.toml.
      - name: Show toolchain
        run: rustup show
      - name: Check formatting
        run: cargo fmt --all --check

  build:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      # `cargo` (the library) pulls in libgit2 / curl / openssl-sys; provide the
      # system dependencies they need on Linux. Windows uses bundled/schannel.
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev cmake

      - name: Show toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose
